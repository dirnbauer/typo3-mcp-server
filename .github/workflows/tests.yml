name: Tests

on:
  push:
  pull_request:

jobs:
  documentation:
    runs-on: ubuntu-latest
    name: Documentation render check

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Render TYPO3 documentation
        run: docker run --rm --pull always -v "$PWD:/project" ghcr.io/typo3-documentation/render-guides:latest --no-progress --fail-on-log

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit tests with coverage

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: xdebug

      - name: Install Composer dependencies
        run: |
          composer require --no-update "typo3/cms-core:^14.0"
          composer install --no-interaction --prefer-dist

      - name: Run unit test suite with coverage
        run: |
          mkdir -p var/log
          vendor/bin/phpunit -c Tests/UnitTests.xml --coverage-clover var/log/unit-coverage.xml

  functional-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.3'
            typo3-version: '^14.0'
          - php-version: '8.4'
            typo3-version: '^14.0'
          - php-version: '8.2'
            typo3-version: '^13.4'
          - php-version: '8.3'
            typo3-version: '^13.4'

    name: "PHP ${{ matrix.php-version }} / TYPO3 ${{ matrix.typo3-version }}"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: sqlite3, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: |
          composer require --no-update "typo3/cms-core:${{ matrix.typo3-version }}"
          composer install --no-interaction --prefer-dist

      - name: Run functional test suite
        run: composer test

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: sqlite3, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: |
          composer require --no-update "typo3/cms-core:^14.0"
          composer install --no-interaction --prefer-dist

      - name: PHPStan
        run: composer phpstan

      - name: PHPat architecture rules
        run: vendor/bin/phpat test

      - name: PHP CS Fixer
        run: composer php-cs-fixer

      - name: Rector
        run: composer rector

      - name: Fractor
        run: composer fractor
