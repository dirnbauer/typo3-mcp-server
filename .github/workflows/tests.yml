name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  documentation:
    runs-on: ubuntu-latest
    name: Documentation render check

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Render TYPO3 documentation
        run: docker run --rm --pull always -v "$PWD:/project" ghcr.io/typo3-documentation/render-guides:latest --no-progress --fail-on-log

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit tests with coverage

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@2.37.0
        with:
          php-version: '8.3'
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit test suite with coverage
        run: |
          mkdir -p var/log
          vendor/bin/phpunit -c Tests/UnitTests.xml --coverage-clover var/log/unit-coverage.xml

  functional-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.3'
            typo3-version: '^14.0'
          - php-version: '8.4'
            typo3-version: '^14.0'
          - php-version: '8.2'
            typo3-version: '^14.0'

    name: "PHP ${{ matrix.php-version }} / TYPO3 ${{ matrix.typo3-version }}"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@2.37.0
        with:
          php-version: ${{ matrix.php-version }}
          extensions: sqlite3, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run functional test suite
        run: composer test

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@2.37.0
        with:
          php-version: '8.3'
          extensions: sqlite3, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan
        run: composer phpstan

      - name: PHP CS Fixer
        run: composer php-cs-fixer

      - name: Rector
        run: composer rector

      - name: Fractor
        run: composer fractor

  llm-trigger:
    runs-on: ubuntu-latest
    name: Check LLM trigger
    if: github.event_name == 'pull_request'
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Check if tool-related files changed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')
          if echo "$FILES" | grep -qE '^(Classes/MCP/Tool/|Classes/Service/|Tests/Llm/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  llm-tests:
    needs: [llm-trigger]
    if: always() && (github.event_name == 'push' || needs.llm-trigger.outputs.run == 'true')
    runs-on: ubuntu-latest
    name: LLM Tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@2.37.0
        with:
          php-version: '8.4'
          extensions: sqlite3, pdo_sqlite, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create web entry point
        run: touch index.php

      - name: Run LLM test suite
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: vendor/bin/paratest -c Tests/Llm/phpunit-llm.xml --testdox --no-progress -p 5 --log-junit .Build/llm-results.xml
        continue-on-error: true

      - name: Check majority pass rule
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: php Build/check-llm-results.php --min-pass=3
