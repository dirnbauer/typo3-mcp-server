<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:be.pageRenderer includeJavaScriptModules="{0: '@hn/mcp-server/mcp-module.js'}" />

<div class="module-body mcp-module">
    <div class="row">
        <div class="col-12 mcp-module-column">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title h4 mb-1">
                        <f:translate id="connectionSetup.title" domain="mcp_server.mod" />
                    </h2>
                    <p class="text-muted mb-0">
                        <f:translate id="connectionSetup.description" domain="mcp_server.mod" />
                    </p>
                </div>
                <div class="card-body">
                    <ul class="nav nav-tabs mcp-setup-tabs" id="mcpSetupTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button id="setup-tab" class="nav-link active" type="button" role="tab" aria-selected="true" data-mcp-target="setup-panel">
                                <f:translate id="tab.setup" domain="mcp_server.mod" />
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button id="connection-check-tab" class="nav-link" type="button" role="tab" aria-selected="false" data-mcp-target="connection-check-panel">
                                <f:translate id="tab.connectionCheck" domain="mcp_server.mod" />
                            </button>
                        </li>
                    </ul>

                    <div class="mcp-panel-group mt-3" id="mcpSetupTabsContent">
                        <div class="mcp-panel mcp-active" id="setup-panel" role="tabpanel">
                            <f:if condition="{diagnostics.overallStatus} == 'error'">
                                <div class="callout callout-danger mb-3">
                                    <f:translate id="setup.diagnosticHintError" domain="mcp_server.mod" />
                                    <button type="button" class="btn btn-link btn-sm p-0 align-baseline" data-mcp-switch-tab="connection-check-panel">
                                        <f:translate id="tab.connectionCheck" domain="mcp_server.mod" />
                                    </button>
                                </div>
                            </f:if>

                            <div class="mb-4">
                                <label for="remote-server-url" class="form-label">
                                    <f:translate id="remote.serverUrl" domain="mcp_server.mod" />
                                </label>
                                <div class="input-group">
                                    <input type="text" class="form-control font-monospace" value="{mcpEndpointUrl}" readonly id="remote-server-url" />
                                    <button class="btn btn-default copy-button" type="button" data-copy-target="remote-server-url">
                                        <f:translate id="remote.copyServerUrl" domain="mcp_server.mod" />
                                    </button>
                                </div>
                                <p class="form-text text-muted mb-0">
                                    <f:translate id="setup.serverUrlHint" domain="mcp_server.mod" />
                                </p>
                            </div>

                            <ul class="nav nav-pills mcp-client-pills mb-3" id="clientTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link mcp-client-pill active" type="button" role="tab" data-mcp-target="cursor-panel" data-mcp-client="cursor">
                                        <span class="mcp-client-label"><f:translate id="client.cursor" domain="mcp_server.mod" /></span>
                                    </button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link mcp-client-pill" type="button" role="tab" data-mcp-target="claude-panel" data-mcp-client="claude">
                                        <span class="mcp-client-label"><f:translate id="client.claudeDesktop" domain="mcp_server.mod" /></span>
                                    </button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link mcp-client-pill" type="button" role="tab" data-mcp-target="codex-panel" data-mcp-client="codex">
                                        <span class="mcp-client-label"><f:translate id="client.codex" domain="mcp_server.mod" /></span>
                                    </button>
                                </li>
                            </ul>

                            <div class="mcp-panel-group" id="clientTabsContent">
                                <div class="mcp-panel mcp-active" id="cursor-panel" role="tabpanel">
                                    <h3 class="h5"><f:translate id="cursor.title" domain="mcp_server.mod" /></h3>
                                    <p class="text-muted"><f:translate id="cursor.description" domain="mcp_server.mod" /></p>
                                    <div class="mb-3">
                                        <a class="btn btn-primary" href="{cursorInstallUrl}" target="_top">
                                            <f:translate id="cursor.installButton" domain="mcp_server.mod" />
                                        </a>
                                    </div>
                                    <p class="small text-muted"><f:translate id="cursor.authReuseNote" domain="mcp_server.mod" /></p>
                                    <p class="mb-2"><f:translate id="cursor.manualConfig" domain="mcp_server.mod" /></p>
                                    <textarea class="form-control font-monospace mb-2" rows="8" readonly id="cursor-config"><f:format.raw>{localStdioConfigJson}</f:format.raw></textarea>
                                    <button class="btn btn-default btn-sm copy-button" type="button" data-copy-target="cursor-config">
                                        <f:translate id="cursor.copyConfig" domain="mcp_server.mod" />
                                    </button>
                                </div>

                                <div class="mcp-panel" id="claude-panel" role="tabpanel">
                                    <h3 class="h5"><f:translate id="claude.title" domain="mcp_server.mod" /></h3>
                                    <p class="text-muted"><f:translate id="claude.description" domain="mcp_server.mod" /></p>
                                    <ol class="mb-3">
                                        <li><f:translate id="claude.step1" domain="mcp_server.mod" /></li>
                                        <li><f:translate id="claude.step2" domain="mcp_server.mod" /></li>
                                        <li><f:translate id="claude.step3" domain="mcp_server.mod" arguments="{name: siteName}" /></li>
                                        <li><f:translate id="claude.step4" domain="mcp_server.mod" arguments="{url: mcpEndpointUrl}" /></li>
                                        <li><f:translate id="claude.step5" domain="mcp_server.mod" /></li>
                                    </ol>
                                    <p class="small text-muted mb-0">
                                        <f:translate id="claude.oauthHint" domain="mcp_server.mod" />
                                    </p>
                                </div>

                                <div class="mcp-panel" id="codex-panel" role="tabpanel">
                                    <h3 class="h5"><f:translate id="codex.title" domain="mcp_server.mod" /></h3>
                                    <p class="text-muted"><f:translate id="codex.description" domain="mcp_server.mod" /></p>
                                    <p class="mb-2"><f:translate id="codex.manualConfig" domain="mcp_server.mod" /></p>
                                    <textarea class="form-control font-monospace mb-2" rows="8" readonly id="codex-config"><f:format.raw>{codexConfigToml}</f:format.raw></textarea>
                                    <button class="btn btn-default btn-sm copy-button" type="button" data-copy-target="codex-config">
                                        <f:translate id="codex.copyConfig" domain="mcp_server.mod" />
                                    </button>
                                    <p class="small text-muted mt-3 mb-0"><f:translate id="codex.restartHint" domain="mcp_server.mod" /></p>
                                </div>
                            </div>
                        </div>

                        <div class="mcp-panel" id="connection-check-panel" role="tabpanel">
                            <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-3">
                                <div>
                                    <h3 class="h5 mb-1"><f:translate id="diagnostic.title" domain="mcp_server.mod" /></h3>
                                    <p class="text-muted mb-0"><f:translate id="diagnostic.intro" domain="mcp_server.mod" /></p>
                                </div>
                                <button type="button" class="btn btn-default" id="refresh-diagnostics-btn">
                                    <f:translate id="diagnostic.refresh" domain="mcp_server.mod" />
                                </button>
                            </div>

                            <div id="diagnostics-panel-content">
                                <f:render partial="McpServerModule/DiagnosticsPanelContent" arguments="{diagnostics: diagnostics, createWorkspaceUrl: createWorkspaceUrl}" />
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mt-3">
                <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2">
                    <div>
                        <h2 class="card-title h4 mb-0">
                            <f:translate id="tokens.title" domain="mcp_server.mod" />
                        </h2>
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                        <button id="refresh-tokens-btn" class="btn btn-default btn-sm" type="button">
                            <f:translate id="tokens.refresh" domain="mcp_server.mod" />
                        </button>
                        <button id="revoke-all-tokens-btn" class="btn btn-danger btn-sm" type="button">
                            <f:translate id="tokens.revokeAll" domain="mcp_server.mod" />
                        </button>
                        <button id="create-token-btn" class="btn btn-primary btn-sm" type="button">
                            <f:translate id="tokens.createToken" domain="mcp_server.mod" />
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <p class="text-muted">
                        <f:translate id="tokens.description" domain="mcp_server.mod" />
                    </p>

                    <div id="tokens-container" data-csrf-token="{csrfToken}">
                        <f:if condition="{tokens}">
                            <f:then>
                                <div class="table-responsive">
                                    <table class="table table-striped">
                                        <thead>
                                            <tr>
                                                <th><f:translate id="tokens.clientName" domain="mcp_server.mod" /></th>
                                                <th><f:translate id="tokens.created" domain="mcp_server.mod" /></th>
                                                <th><f:translate id="tokens.lastUsed" domain="mcp_server.mod" /></th>
                                                <th><f:translate id="tokens.expires" domain="mcp_server.mod" /></th>
                                                <th><f:translate id="tokens.actions" domain="mcp_server.mod" /></th>
                                            </tr>
                                        </thead>
                                        <tbody id="tokens-table-body">
                                            <f:for each="{tokens}" as="token">
                                                <tr data-token-id="{token.uid}">
                                                    <td><strong>{token.client_name}</strong></td>
                                                    <td><small class="text-muted">{token.created}</small></td>
                                                    <td><small class="text-muted">{token.last_used}</small></td>
                                                    <td><small class="text-muted">{token.expires}</small></td>
                                                    <td>
                                                        <button class="btn btn-danger btn-sm revoke-token-btn" type="button" data-token-id="{token.uid}">
                                                            <f:translate id="tokens.revoke" domain="mcp_server.mod" />
                                                        </button>
                                                    </td>
                                                </tr>
                                            </f:for>
                                        </tbody>
                                    </table>
                                </div>
                            </f:then>
                            <f:else>
                                <div id="no-tokens-message" class="text-center text-muted py-4">
                                    <p><f:translate id="tokens.noTokens" domain="mcp_server.mod" /></p>
                                    <p class="small mb-0"><f:translate id="tokens.noTokensHint" domain="mcp_server.mod" /></p>
                                </div>
                            </f:else>
                        </f:if>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
